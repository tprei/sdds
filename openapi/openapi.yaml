openapi: 3.0.3
info:
  title: sdds API
  version: 0.0.0
  description: HTTP JSON contract for the sdds API.
  license:
    name: UNLICENSED
    url: https://spdx.org/licenses/UNLICENSED.html
servers:
  - url: /
    description: Active API origin
security: []
tags:
  - name: Operations
    description: Runtime health endpoints.
  - name: Catalog
    description: Backend-owned category and place catalogs.
  - name: Notes
    description: Text-first recommendation notes.
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Check process health
      tags:
        - Operations
      responses:
        "204":
          description: The API process is running.
        "400":
          description: The request does not match the API contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /readyz:
    get:
      operationId: getReadiness
      summary: Check API readiness
      tags:
        - Operations
      responses:
        "204":
          description: The API can serve traffic.
        "400":
          description: The request does not match the API contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/categories:
    get:
      operationId: listCategories
      summary: List category catalog
      tags:
        - Catalog
      responses:
        "200":
          description: Category catalog rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCategoriesResponse"
        "400":
          description: The request does not match the API contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The API could not list categories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/places:
    get:
      operationId: listPlaces
      summary: List place catalog
      tags:
        - Catalog
      responses:
        "200":
          description: Place catalog rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListPlacesResponse"
        "400":
          description: The request does not match the API contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The API could not list places.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/notes:
    get:
      operationId: listNotes
      summary: List recent notes
      tags:
        - Notes
      responses:
        "200":
          description: Recent notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotesResponse"
        "400":
          description: The request does not match the API contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The API could not list notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createNote
      summary: Create a note
      tags:
        - Notes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "201":
          description: The note was created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "400":
          description: The request JSON or note content is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: The request body is too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The API could not create the note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/notes/{note_id}:
    get:
      operationId: getNote
      summary: Get a note
      tags:
        - Notes
      parameters:
        - name: note_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Note"
        "400":
          description: The request does not match the API contract.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: The note was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The API could not get the note.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /v1/search/notes:
    get:
      operationId: searchNotes
      summary: Search notes
      tags:
        - Notes
      parameters:
        - name: q
          in: query
          required: false
          description: Raw user search text. Missing, blank, or overlong values return invalid_search.
          schema:
            type: string
      responses:
        "200":
          description: Matching notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListNotesResponse"
        "400":
          description: The search query is invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: The API could not search notes.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    CategorySlug:
      type: string
    CitySlug:
      type: string
    PlaceSlug:
      type: string
    CatalogCategory:
      type: object
      additionalProperties: false
      required:
        - slug
        - label
        - active
        - display_order
      properties:
        slug:
          $ref: "#/components/schemas/CategorySlug"
        label:
          type: string
        active:
          type: boolean
        display_order:
          type: integer
          format: int32
    CatalogPlace:
      type: object
      additionalProperties: false
      required:
        - slug
        - label
        - active
        - display_order
      properties:
        slug:
          $ref: "#/components/schemas/PlaceSlug"
        label:
          type: string
        active:
          type: boolean
        display_order:
          type: integer
          format: int32
    CreateNoteRequest:
      type: object
      additionalProperties: false
      required:
        - title
        - body
        - category_slug
        - city_slug
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        body:
          type: string
          minLength: 1
          maxLength: 4000
        category_slug:
          $ref: "#/components/schemas/CategorySlug"
        city_slug:
          $ref: "#/components/schemas/CitySlug"
    ErrorCode:
      type: string
      x-enum-varnames:
        - ErrorCodeInternal
        - ErrorCodeInvalidJSON
        - ErrorCodeInvalidNote
        - ErrorCodeInvalidSearch
        - ErrorCodeNotFound
        - ErrorCodeRequestTooLarge
      enum:
        - internal_error
        - invalid_json
        - invalid_note
        - invalid_search
        - not_found
        - request_too_large
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - code
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/ValidationProblem"
    ListNotesResponse:
      type: object
      additionalProperties: false
      required:
        - notes
      properties:
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
    ListCategoriesResponse:
      type: object
      additionalProperties: false
      required:
        - categories
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CatalogCategory"
    ListPlacesResponse:
      type: object
      additionalProperties: false
      required:
        - places
      properties:
        places:
          type: array
          items:
            $ref: "#/components/schemas/CatalogPlace"
    Note:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - body
        - category_slug
        - city_slug
        - created_at
        - updated_at
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        category_slug:
          $ref: "#/components/schemas/CategorySlug"
        city_slug:
          $ref: "#/components/schemas/CitySlug"
        created_at:
          type: integer
          format: int64
          minimum: 0
          description: Unix timestamp in milliseconds.
        updated_at:
          type: integer
          format: int64
          minimum: 0
          description: Unix timestamp in milliseconds.
    ValidationField:
      type: string
      x-enum-varnames:
        - ValidationFieldTitle
        - ValidationFieldBody
        - ValidationFieldCategorySlug
        - ValidationFieldCitySlug
        - ValidationFieldQ
      enum:
        - title
        - body
        - category_slug
        - city_slug
        - q
    ValidationProblem:
      type: object
      additionalProperties: false
      required:
        - field
        - code
      properties:
        field:
          $ref: "#/components/schemas/ValidationField"
        code:
          type: string
          x-enum-varnames:
            - ValidationProblemCodeRequired
            - ValidationProblemCodeTooShort
            - ValidationProblemCodeTooLong
            - ValidationProblemCodeUnknown
          enum:
            - required
            - too_short
            - too_long
            - unknown
