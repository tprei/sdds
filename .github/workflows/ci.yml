name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check Go formatting
        run: |
          files="$(gofmt -l services/api)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Test API
        run: go test ./...

  mobile:
    name: Mobile And Tokens
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Lint OpenAPI contract
        run: pnpm openapi:lint

      - name: Check generated TypeScript API contract
        run: pnpm openapi:check:ts

      - name: Check generated Go API contract
        run: pnpm openapi:check:go

      - name: Typecheck tokens
        run: pnpm typecheck:tokens

      - name: Typecheck mobile
        run: pnpm typecheck:mobile

      - name: Test mobile
        run: pnpm test:mobile
