name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test API
        run: go test ./services/api/...

  api-migrations:
    name: API Migrations
    runs-on: ubuntu-latest
    needs: api
    timeout-minutes: 10
    env:
      COMPOSE_PROJECT_NAME: sdds-ci-migrations-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Reset API migration state
        run: docker compose -f infra/compose/compose.yaml down --volumes

      - name: Validate API migrations
        run: docker compose -f infra/compose/compose.yaml run --build --rm --no-deps api migrate

      - name: Stop API migrations
        if: always()
        run: docker compose -f infra/compose/compose.yaml down --volumes

  api-docker-integration:
    name: API Docker Integration
    runs-on: ubuntu-latest
    needs: api-migrations
    timeout-minutes: 15
    env:
      COMPOSE_PROJECT_NAME: sdds-ci-${{ github.run_id }}-${{ github.run_attempt }}
      SDDS_HTTP_PORT: 18080-18999
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Provision Compose secrets
        run: |
          umask 077
          dir="$RUNNER_TEMP/sdds-compose"; install -d -m 700 "$dir"
          openssl rand -hex 10 >"$dir/rustfs-root-access"
          openssl rand -hex 20 >"$dir/rustfs-root-secret"
          openssl rand -hex 10 >"$dir/sdds-media-access"
          openssl rand -hex 20 >"$dir/sdds-media-secret"
          chmod 444 "$dir"/rustfs-root-access "$dir"/rustfs-root-secret "$dir"/sdds-media-access "$dir"/sdds-media-secret
          {
            printf 'SDDS_COMPOSE_RUSTFS_ROOT_ACCESS_KEY_FILE=%s\n' "$dir/rustfs-root-access"
            printf 'SDDS_COMPOSE_RUSTFS_ROOT_SECRET_KEY_FILE=%s\n' "$dir/rustfs-root-secret"
            printf 'SDDS_COMPOSE_SDDS_MEDIA_ACCESS_KEY_FILE=%s\n' "$dir/sdds-media-access"
            printf 'SDDS_COMPOSE_SDDS_MEDIA_SECRET_KEY_FILE=%s\n' "$dir/sdds-media-secret"
          } >>"$GITHUB_ENV"

      - name: Reset API Docker integration state
        run: docker compose -f infra/compose/compose.yaml down --volumes

      - name: Start API
        run: docker compose -f infra/compose/compose.yaml up --build -d api

      - name: Export API base URL
        run: |
          published="$(docker compose -f infra/compose/compose.yaml port api 8080)"
          port="${published##*:}"
          echo "SDDS_API_BASE_URL=http://127.0.0.1:${port}" >> "$GITHUB_ENV"

      - name: Test API Docker integration
        run: pnpm test:api:integration
      - name: Capture RustFS logs
        if: failure()
        run: docker compose -f infra/compose/compose.yaml logs --no-color rustfs

      - name: Capture RustFS init logs
        if: failure()
        run: docker compose -f infra/compose/compose.yaml logs --no-color rustfs-init

      - name: Capture API logs
        if: failure()
        run: docker compose -f infra/compose/compose.yaml logs --no-color api

      - name: Stop API
        if: always()
        run: docker compose -f infra/compose/compose.yaml down --volumes

      - name: Remove Compose secrets
        if: always()
        run: rm -rf "$RUNNER_TEMP/sdds-compose"

  rustfs-integration:
    name: RustFS Integration
    runs-on: ubuntu-latest
    needs: api-docker-integration
    timeout-minutes: 20
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Test RustFS integration
        run: pnpm test:rustfs

  mobile:
    name: Mobile And Tokens
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check mobile API schemas
        run: pnpm api:schema:check

      - name: Check generated Go API contract
        run: pnpm openapi:check:go

      - name: Typecheck tokens
        run: pnpm typecheck:tokens

      - name: Test mobile
        run: pnpm test:mobile
