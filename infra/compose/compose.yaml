name: sdds

services:
  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    environment:
      SDDS_HTTP_ADDR: :8080
      SDDS_DATABASE_PATH: /data/sdds.db
    ports:
      - target: 8080
        published: "${SDDS_HTTP_PORT:-8080}"
        protocol: tcp
    volumes:
      - api-data:/data

volumes:
  api-data:
