name: sdds

services:
  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    environment:
      SDDS_HTTP_ADDR: :8080
      SDDS_DATABASE_PATH: /data/sdds.db
      SDDS_AUTH_SIGNUP_REQUESTS_PER_MINUTE: "${SDDS_AUTH_SIGNUP_REQUESTS_PER_MINUTE:-5}"
      SDDS_AUTH_LOGIN_REQUESTS_PER_MINUTE: "${SDDS_AUTH_LOGIN_REQUESTS_PER_MINUTE:-10}"
      SDDS_AUTH_HASH_CONCURRENCY: "${SDDS_AUTH_HASH_CONCURRENCY:-2}"
    ports:
      - target: 8080
        published: "${SDDS_HTTP_PORT:-8080}"
        protocol: tcp
    volumes:
      - api-data:/data

volumes:
  api-data:
